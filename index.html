<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapCurrency | Currency Converter</title>

    <link rel="stylesheet" href="style.css" />

  </head>

  <body>
    <div class="circle circle--purple"></div>
    <div class="circle circle--blue"></div>

    <main class="currencyConverter">
      <div class="theme-toggle">
        <button id="themeToggle" type="button" title="Toggle Theme">
          &#9790;
        </button>
      </div>

      <h1 class="SnapCurrency-converter_title">SnapCurrency</h1>

      <p id="errorMessage" role="alert"></p>

      <div class="amount-box">
        <label for="inputSourceCurrency">Amount</label>
        <input
          type="number"
          id="inputSourceCurrency"
          class="currency-converter__input"
          value="1"
          min="0.01"
          step="0.01"
          placeholder="Enter Amount"
        />
      </div>

      <div class="currency-converter__select-group">
        <section class="currency-converter__select">
          <button
            id="favoriteSource"
            class="favorite-btn"
            type="button"
            title="Favorite"
          >
            &#9734;
          </button>

          <img
            id="imageSourceCurrency"
            src="https://flagcdn.com/48x36/us.png"
            alt="USD"
          />

          <div class="currency-inputs">
            <input
              type="text"
              id="searchSource"
              class="currency-search"
              placeholder="Search Currency..."
            />

            <select
              id="selectSourceCurrency"
              aria-label="Source currency"
            ></select>
          </div>
        </section>

        <button
          id="swapButton"
          class="currency-converter__swap-button"
          type="button"
          title="Swap Currency"
        >
          &#8644;
        </button>

        <section class="currency-converter__select">
          <button
            id="favoriteTarget"
            class="favorite-btn"
            type="button"
            title="Favorite"
          >
            &#9734;
          </button>

          <img
            id="imageTargetCurrency"
            src="https://flagcdn.com/48x36/in.png"
            alt="INR"
          />

          <div class="currency-inputs">
            <input
              type="text"
              id="searchTarget"
              class="currency-search"
              placeholder="Search Currency..."
            />

            <select
              id="selectTargetCurrency"
              aria-label="Target currency"
            ></select>
          </div>
        </section>
      </div>

      <div class="currency-converter__exchange-rate">
        <span
          id="exchangeRateText"
          class="currency-converter__exchange-rate-text"
        >
          1 USD = 0.00 INR
        </span>
      </div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
      </div>

      <div class="result-card">
        <h2 id="resultText">Converted Amount</h2>

        <button id="copyResult" class="copy-btn" type="button">
          Copy
        </button>
      </div>

      <p id="lastUpdated">Last Updated: --</p>

      <button
        id="buttonConvert"
        class="currency-converter__convert-button"
        type="button"
      >
        Convert Currency
      </button>

      <section class="history">
        <h3>Recent Conversions</h3>
        <ul id="historyList"></ul>
      </section>
    </main>

    <section id="chartContainer"></section>
    <div id="alertContainer"></div>
    <button id="installApp" class="hidden" type="button">Install App</button>

    <select id="languageSelector" class="hidden">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="ja">Japanese</option>
      <option value="fr">French</option>
      <option value="de">German</option>
    </select>

    <script type="module" src="script.js"></script>
  </body>
</html>
