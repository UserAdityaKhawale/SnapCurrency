<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapCurrency | Premium Converter</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Background Decor -->
    <div class="bg-gradient-top"></div>
    <div class="bg-gradient-bottom"></div>

    <main class="currency-app">
      <header class="app-header">
        <div>
          <h1 class="app-title">SnapCurrency</h1>
          <div class="status-indicator">
            <span class="dot"></span> Live Rates
          </div>
        </div>
        <button id="themeToggle" type="button" class="theme-toggle-btn" title="Toggle Theme">
          &#9790;
        </button>
      </header>
      
      <p id="errorMessage" role="alert" class="error-toast" style="display: none;"></p>

      <div class="converter-panel">
        
        <!-- Left Side: Source -->
        <div class="converter-side source-side">
          <div class="currency-header">
            <label class="section-label">From</label>
            <button id="favoriteSource" class="favorite-btn" type="button" title="Favorite">&#9734;</button>
          </div>
          
          <div class="currency-selector">
            <img id="imageSourceCurrency" src="https://flagcdn.com/48x36/us.png" alt="USD" class="flag-icon"/>
            <div class="custom-select-wrapper">
              <div class="custom-select" id="customSelectSource">
                <div class="select-trigger" id="triggerSource">
                  <span id="displaySource">USD</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="select-dropdown hidden" id="dropdownSource">
                  <input type="text" id="searchSource" class="dropdown-search" placeholder="Search..." autocomplete="off" />
                  <ul class="dropdown-options" id="optionsSource"></ul>
                </div>
              </div>
              <select id="selectSourceCurrency" class="hidden">
                <option value="USD">USD</option>
              </select>
            </div>
          </div>
          
          <div class="amount-group">
            <input type="number" id="inputSourceCurrency" class="amount-input" value="1" min="0" step="any" placeholder="Enter Amount" />
          </div>
        </div>

        <!-- Center: Swap -->
        <div class="swap-container">
          <button id="swapButton" class="swap-btn" type="button" title="Swap Currency">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 3h5v5M4 20L9 15M20 3l-7 7M4 20h5v-5M15 15l5 5"/>
            </svg>
          </button>
        </div>

        <!-- Right Side: Target -->
        <div class="converter-side target-side">
          <div class="currency-header">
            <label class="section-label">To</label>
            <button id="favoriteTarget" class="favorite-btn" type="button" title="Favorite">&#9734;</button>
          </div>
          
          <div class="currency-selector">
            <img id="imageTargetCurrency" src="https://flagcdn.com/48x36/in.png" alt="INR" class="flag-icon"/>
            <div class="custom-select-wrapper">
              <div class="custom-select" id="customSelectTarget">
                <div class="select-trigger" id="triggerTarget">
                  <span id="displayTarget">INR</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="select-dropdown hidden" id="dropdownTarget">
                  <input type="text" id="searchTarget" class="dropdown-search" placeholder="Search..." autocomplete="off" />
                  <ul class="dropdown-options" id="optionsTarget"></ul>
                </div>
              </div>
              <select id="selectTargetCurrency" class="hidden">
                <option value="INR">INR</option>
              </select>
            </div>
          </div>
          
          <div class="amount-group result-group">
            <div class="result-display">
              <h2 id="resultText">Converted Amount</h2>
              <button id="copyResult" class="copy-btn" type="button" title="Copy Result">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

      </div>

      <div class="action-footer">
        <div class="rate-info">
          <span id="exchangeRateText" class="exchange-rate-text">1 USD = 0.00 INR</span>
          <p id="lastUpdated" class="last-updated">Last Updated: --</p>
        </div>
        <button id="buttonConvert" class="primary-btn" type="button">Convert Currency</button>
      </div>

      <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
      </div>

      <!-- History Section -->
      <section class="history-section">
        <h3 class="history-title">Recent Conversions</h3>
        <ul id="historyList" class="history-list"></ul>
      </section>
      
      <!-- Hidden elements required by existing script to avoid errors -->
      <div style="display: none;">
        <input type="number" id="inputTargetCurrency" />
        <span id="sourceLabel"></span>
        <span id="targetLabel"></span>
        <section id="chartContainer"></section>
        <div id="alertContainer"></div>
        <button id="installApp"></button>
        <select id="languageSelector"><option value="en">English</option></select>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
